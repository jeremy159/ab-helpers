name: ab_helpers
services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      ABH_ENVIRONMENT: "staging"
    depends_on:
      - postgres
      - redis
  postgres:
    image: postgres:16
    restart: always
    ports:
      - 5432:5432
    volumes:
      - db:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: "password"
      POSTGRES_USER: "postgres"
      POSTGRES_DB: ab_helpers
  redis:
    image: "redis:7"
    restart: always
    ports:
      - 6379:6379
    volumes:
      - redis:/data
volumes:
  db:
  redis:
    driver: local
